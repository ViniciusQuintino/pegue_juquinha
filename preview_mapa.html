<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview do Mapa - Jogo do Cachorro</title>
<style>
  body {
    margin: 0;
    background: #222;
    color: #eee;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { margin: 0 0 10px; font-size: 18px; }
  p { margin: 4px 0; font-size: 13px; opacity: 0.8; }
  canvas {
    border: 2px solid #555;
    image-rendering: pixelated;
    background: #b8b8a8;
    margin-top: 10px;
  }
  .legenda {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 6px 18px;
    font-size: 12px;
  }
  .legenda div { display: flex; align-items: center; gap: 6px; }
  .sw { width: 16px; height: 16px; border: 1px solid #000; }
</style>
</head>
<body>
  <h1>Preview do mapa (rascunho visual — sem jogabilidade ainda)</h1>
  <p>O ponto vermelho mostra onde a personagem começa. Os móveis e carros são obstáculos.</p>
  <canvas id="map" width="960" height="640"></canvas>
  <div class="legenda">
    <div><span class="sw" style="background:#b8b8a8"></span> Cimento (terreno + garagem)</div>
    <div><span class="sw" style="background:#c9a96e"></span> Piso interno (cômodos)</div>
    <div><span class="sw" style="background:#4a3220"></span> Paredes</div>
    <div><span class="sw" style="background:#8b5a2b"></span> Cama / Mesa / Armário</div>
    <div><span class="sw" style="background:#7a3a3a"></span> Sofá</div>
    <div><span class="sw" style="background:#222"></span> TV</div>
    <div><span class="sw" style="background:#aac4d8"></span> Pia</div>
    <div><span class="sw" style="background:#555"></span> Fogão</div>
    <div><span class="sw" style="background:#e8e8e8"></span> Carro branco</div>
    <div><span class="sw" style="background:#2a4d8f"></span> Caminhonete</div>
    <div><span class="sw" style="background:#0a0a0a"></span> Buraco (game over)</div>
  </div>

<script>
const c = document.getElementById('map');
const ctx = c.getContext('2d');

// ---- Paleta ----
const COR = {
  cimento: '#b8b8a8',
  cimentoEscuro: '#a8a89a',
  piso: '#c9a96e',
  parede: '#4a3220',
  paredeTopo: '#6a4a30',
  movel: '#8b5a2b',
  movelEscuro: '#6b3f1c',
  metal: '#555',
  metalEscuro: '#333',
  carroBranco: '#e8e8e8',
  caminhonete: '#2a4d8f',
  vidro: '#88c0ff',
  tela: '#1a1a2a',
  pia: '#aac4d8',
  porta: '#3a2410',
};

// ---- Fundo: cimento (terreno todo) ----
function desenhaCimento() {
  ctx.fillStyle = COR.cimento;
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = COR.cimentoEscuro;
  for (let y = 0; y < c.height; y += 8) {
    for (let x = 0; x < c.width; x += 8) {
      if ((x * 7 + y * 13) % 29 < 3) ctx.fillRect(x, y, 4, 4);
    }
  }
  // algumas "rachaduras" sutis
  ctx.strokeStyle = COR.cimentoEscuro;
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const sx = (i * 173) % c.width;
    const sy = (i * 251) % c.height;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + 40, sy + 20);
    ctx.lineTo(sx + 70, sy + 10);
    ctx.stroke();
  }
}

// ---- Caixa de cômodo (paredes + piso) ----
function desenhaComodo(x, y, w, h, opts = {}) {
  const espP = 8;
  ctx.fillStyle = opts.piso || COR.piso;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = COR.parede;
  ctx.fillRect(x, y, w, espP);
  ctx.fillRect(x, y + h - espP, w, espP);
  ctx.fillRect(x, y, espP, h);
  ctx.fillRect(x + w - espP, y, espP, h);
  ctx.fillStyle = COR.paredeTopo;
  ctx.fillRect(x, y, w, 3);

  // portas (aberturas)
  ctx.fillStyle = opts.piso || COR.piso;
  (opts.portas || []).forEach(p => {
    if (p.lado === 'baixo') ctx.fillRect(x + p.pos, y + h - espP, p.tam, espP);
    if (p.lado === 'cima') ctx.fillRect(x + p.pos, y, p.tam, espP);
    if (p.lado === 'esq') ctx.fillRect(x, y + p.pos, espP, p.tam);
    if (p.lado === 'dir') ctx.fillRect(x + w - espP, y + p.pos, espP, p.tam);
  });
}

// ---- Móveis ----
function cama(x, y, w = 60, h = 40) {
  ctx.fillStyle = COR.movel;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#e8d8b0';
  ctx.fillRect(x + 4, y + 4, w - 8, h - 14);
  ctx.fillStyle = '#d49090';
  ctx.fillRect(x + 6, y + 6, w - 12, 8);
  ctx.fillStyle = COR.movelEscuro;
  ctx.fillRect(x, y + h - 4, w, 4);
}
function sofa(x, y, w = 80, h = 30) {
  const horizontal = w >= h;
  ctx.fillStyle = '#7a3a3a';
  ctx.fillRect(x, y, w, h);
  if (horizontal) {
    // encosto embaixo (encostado em parede inferior)
    ctx.fillStyle = '#a05050';
    ctx.fillRect(x + 4, y + 6, w - 8, h - 12);
    ctx.fillStyle = '#5a2828';
    ctx.fillRect(x, y + h - 4, w, 4);
  } else {
    // encosto à esquerda (encostado em parede esquerda)
    ctx.fillStyle = '#a05050';
    ctx.fillRect(x + 6, y + 4, w - 12, h - 8);
    ctx.fillStyle = '#5a2828';
    ctx.fillRect(x, y, 4, h);
  }
}
function mesa(x, y, w = 60, h = 35) {
  ctx.fillStyle = COR.movelEscuro;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = COR.movel;
  ctx.fillRect(x + 3, y + 3, w - 6, h - 10);
}
function armario(x, y, w = 30, h = 50) {
  ctx.fillStyle = COR.movelEscuro;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = COR.movel;
  ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
  ctx.fillStyle = '#3a1f0a';
  ctx.fillRect(x + w / 2 - 1, y + 3, 2, h - 6);
}
function armarioH(x, y, w = 80, h = 30) {
  ctx.fillStyle = COR.movelEscuro;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = COR.movel;
  ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
  ctx.fillStyle = '#3a1f0a';
  ctx.fillRect(x + 3, y + h / 2 - 1, w - 6, 2);
}
function fogao(x, y, w = 45, h = 35) {
  ctx.fillStyle = COR.metalEscuro;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = COR.metal;
  ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
  ctx.fillStyle = '#222';
  ctx.fillRect(x + 8, y + 8, 8, 8);
  ctx.fillRect(x + w - 16, y + 8, 8, 8);
  ctx.fillRect(x + 8, y + 20, 8, 8);
  ctx.fillRect(x + w - 16, y + 20, 8, 8);
}
function tv(x, y, w = 40, h = 60) {
  const horizontal = w >= h;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = COR.tela;
  if (horizontal) {
    ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
    ctx.fillStyle = '#3a3a5a';
    ctx.fillRect(x + 6, y + 5, 10, 6);
  } else {
    ctx.fillRect(x + 3, y + 3, w - 6, h - 10);
    ctx.fillStyle = '#3a3a5a';
    ctx.fillRect(x + 5, y + 5, 6, 6);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + w / 2 - 4, y + h - 5, 8, 4);
  }
}
function buraco(x, y, w = 40, h = 40) {
  // borda de terra
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
  // buraco preto
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(x, y, w, h);
  // profundidade (degradê escuro)
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, '#2a2a2a');
  grad.addColorStop(0.5, '#000');
  grad.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
}

function pia(x, y, w = 30, h = 80) {
  ctx.fillStyle = '#d8d8c8';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  if (h > 70) {
    ctx.fillStyle = COR.pia;
    ctx.fillRect(x + 4, y + 8, w - 8, h / 2 - 8);
    ctx.fillRect(x + 4, y + h / 2 + 4, w - 8, h / 2 - 12);
    ctx.strokeRect(x + 4, y + 8, w - 8, h / 2 - 8);
    ctx.strokeRect(x + 4, y + h / 2 + 4, w - 8, h / 2 - 12);
    ctx.fillStyle = '#777';
    ctx.fillRect(x + w / 2 - 2, y + h / 2 - 4, 4, 8);
  } else {
    ctx.fillStyle = COR.pia;
    ctx.fillRect(x + 4, y + 8, w - 8, h - 16);
    ctx.strokeRect(x + 4, y + 8, w - 8, h - 16);
    ctx.fillStyle = '#777';
    ctx.fillRect(x + w / 2 - 2, y + 2, 4, 8);
  }
}

// ---- Veículos (vista de cima) ----
function carro(x, y, cor, w = 50, h = 90) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x + 3, y + 3, w, h);
  ctx.fillStyle = cor;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 4, y + 4, w - 8, 2);
  ctx.fillStyle = COR.vidro;
  ctx.fillRect(x + 6, y + 8, w - 12, 14);
  ctx.fillStyle = cor === COR.carroBranco ? '#c0c0c0' : '#1a3060';
  ctx.fillRect(x + 6, y + 24, w - 12, h - 50);
  ctx.fillStyle = COR.vidro;
  ctx.fillRect(x + 6, y + h - 24, w - 12, 12);
  ctx.fillStyle = '#fff8aa';
  ctx.fillRect(x + 4, y, 8, 3);
  ctx.fillRect(x + w - 12, y, 8, 3);
  ctx.fillStyle = '#aa2020';
  ctx.fillRect(x + 4, y + h - 3, 8, 3);
  ctx.fillRect(x + w - 12, y + h - 3, 8, 3);
  ctx.fillStyle = 'rgba(255,255,0,0.6)';
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y - 10);
  ctx.lineTo(x + w / 2 - 6, y - 2);
  ctx.lineTo(x + w / 2 + 6, y - 2);
  ctx.closePath();
  ctx.fill();
}

// ---- Garagem: marcações de vaga sobre o cimento ----
function desenhaGaragem(x, y, w, h) {
  // linhas de demarcação de vaga
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.4;
  // borda da vaga em cima
  ctx.fillRect(x + 8, y + 8, w - 16, 2);
  ctx.fillRect(x + 8, y + 8, 2, 80);
  ctx.fillRect(x + w - 10, y + 8, 2, 80);
  // borda da vaga embaixo
  ctx.fillRect(x + 8, y + h - 10, w - 16, 2);
  ctx.fillRect(x + 8, y + h - 90, 2, 80);
  ctx.fillRect(x + w - 10, y + h - 90, 2, 80);
  ctx.globalAlpha = 1;
}

// ====== DESENHO PRINCIPAL ======

desenhaCimento();

// --- ESQUERDA: dois quartos separados ---
// Quarto 1 (superior esquerdo)
desenhaComodo(40, 60, 220, 180, {
  portas: [{ lado: 'dir', pos: 80, tam: 30 }]
});
armarioH(110, 68, 80, 30);              // armário na parede superior
cama(50, 100, 90, 45);                  // cama encostada à parede esquerda
tv(212, 80, 40, 50);                    // TV ao lado da porta (parede direita)

// Buraco fora do Q1 (área de cimento, abaixo da parede inferior)
buraco(120, 255, 50, 50);

// Quarto 2 (inferior esquerdo) — PONTO DE PARTIDA
desenhaComodo(40, 380, 220, 200, {
  portas: [{ lado: 'dir', pos: 100, tam: 30 }]
});
cama(70, 410, 90, 50);
armarioH(110, 542, 80, 30);             // armário na parede inferior

// --- CENTRO: garagem (mesmo cimento do terreno) ---
desenhaGaragem(310, 60, 200, 520);
carro(335, 110, COR.carroBranco);
carro(335, 380, COR.caminhonete, 50, 110);

// --- DIREITA: casa principal ---
// Quarto (cima)
desenhaComodo(560, 60, 360, 180, {
  portas: [{ lado: 'baixo', pos: 290, tam: 30 }]
});
cama(580, 90, 90, 50);
armario(870, 80, 30, 50);

// Sala (meio) — TV na parede esquerda, sofás no lado direito
desenhaComodo(560, 240, 360, 180, {
  portas: [
    { lado: 'cima', pos: 290, tam: 30 },
    { lado: 'baixo', pos: 290, tam: 30 },
    { lado: 'esq', pos: 70, tam: 30 }
  ]
});
tv(575, 250, 80, 30);                   // TV horizontal na parede superior, alinhada à esquerda
sofa(568, 350, 30, 60);                 // sofá vertical encostado parede esquerda
sofa(600, 384, 80, 28);                 // sofá horizontal encostado parede inferior

// Cozinha (baixo) — pia esq, mesa topo, fogão baixo, armário dir
desenhaComodo(560, 420, 360, 200, {
  portas: [
    { lado: 'cima', pos: 290, tam: 30 },  // vinda da sala (à direita da parede)
    { lado: 'esq', pos: 50, tam: 30 }     // vinda da garagem (parte superior da parede esq)
  ]
});
pia(568, 552, 30, 60);                  // pia única alinhada ao inferior, parede esquerda
mesa(700, 433, 80, 40);                 // mesa colada na parede superior
fogao(717, 577, 45, 35);                // fogão colado na parede inferior
armario(882, 495, 30, 60);              // armário colado na parede direita

// ---- Marcador de início da personagem ----
ctx.fillStyle = '#ff3030';
ctx.beginPath();
ctx.arc(110, 540, 10, 0, Math.PI * 2);
ctx.fill();
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = 'bold 12px monospace';
ctx.fillText('INÍCIO', 88, 565);

// ---- Etiquetas ----
ctx.fillStyle = '#000';
ctx.font = 'bold 11px monospace';
ctx.fillText('QUARTO 1', 110, 50);
ctx.fillText('QUARTO 2 (início)', 80, 370);
ctx.fillText('GARAGEM', 365, 50);
ctx.fillText('QUARTO', 700, 50);
ctx.fillText('SALA', 720, 230);
ctx.fillText('COZINHA', 700, 410);
</script>
</body>
</html>
